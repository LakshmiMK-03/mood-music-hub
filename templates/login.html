{% extends "base.html" %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">🎵</div>
                <h1>Welcome <span class="text-gradient">Back</span></h1>
                <p>Sign in to access your personalized emotion analysis & music recommendations</p>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>
                        <i data-lucide="mail" style="width: 16px; color: var(--secondary);"></i> Email
                    </label>
                    <input type="email" id="login-email" class="auth-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>
                        <i data-lucide="lock" style="width: 16px; color: var(--secondary);"></i> Password
                    </label>
                    <input type="password" id="login-password" class="auth-input" placeholder="Enter your password"
                        required>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <label
                        style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--muted-foreground); cursor: pointer;">
                        <input type="checkbox" style="accent-color: var(--secondary);"> Remember me
                    </label>
                    <a href="#" style="font-size: 0.85rem; color: var(--secondary); text-decoration: none;">Forgot
                        password?</a>
                </div>
                <button type="submit" class="btn btn-primary auth-btn">
                    <i data-lucide="log-in" style="width: 18px;"></i> Sign In
                </button>
            </form>

            <div class="auth-divider"><span>or</span></div>

            <div class="auth-social">
                <button class="btn-social" onclick="alert('Google login coming soon!')">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    Continue with Google
                </button>
            </div>

            <p class="auth-footer">
                Don't have an account? <a href="/register">Create one</a>
            </p>
        </div>
    </div>
</section>

<style>
    .auth-section {
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: var(--gradient-hero);
    }

    .auth-container {
        width: 100%;
        max-width: 440px;
    }

    .auth-card {
        background: #ffffff;
        border-radius: 1rem;
        padding: 2.5rem;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
        border: 1px solid var(--border);
    }

    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .auth-logo {
        font-size: 2.5rem;
        margin-bottom: 0.75rem;
    }

    .auth-header h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
    }

    .auth-header p {
        color: var(--muted-foreground);
        font-size: 0.9rem;
    }

    .form-group {
        margin-bottom: 1.25rem;
    }

    .form-group label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 600;
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
    }

    .auth-input {
        width: 100%;
        padding: 0.85rem 1rem;
        border: 1.5px solid var(--border);
        border-radius: 0.625rem;
        font-size: 1rem;
        font-family: inherit;
        transition: border-color 0.2s, box-shadow 0.2s;
        background: var(--background);
        color: var(--foreground);
    }

    .auth-input:focus {
        outline: none;
        border-color: var(--secondary);
        box-shadow: 0 0 0 3px hsla(160, 50%, 50%, 0.12);
    }

    .auth-btn {
        width: 100%;
        padding: 0.9rem;
        font-size: 1rem;
        gap: 0.5rem;
    }

    .auth-divider {
        text-align: center;
        margin: 1.5rem 0;
        position: relative;
    }

    .auth-divider::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: var(--border);
    }

    .auth-divider span {
        background: #ffffff;
        padding: 0 1rem;
        color: var(--muted-foreground);
        font-size: 0.85rem;
        position: relative;
    }

    .auth-social {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }

    .btn-social {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        width: 100%;
        padding: 0.75rem;
        border: 1.5px solid var(--border);
        border-radius: 0.625rem;
        background: #ffffff;
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
        color: var(--foreground);
    }

    .btn-social:hover {
        background: var(--muted);
    }

    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        color: var(--muted-foreground);
        font-size: 0.9rem;
    }

    .auth-footer a {
        color: var(--secondary);
        font-weight: 600;
        text-decoration: none;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>

<script>
    function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    if (data.user && data.user.role === 'admin') {
                        window.location.href = '/admin';
                    } else {
                        window.location.href = '/analyze';
                    }
                }
                else { alert(data.message || 'Invalid credentials'); }
            })
            .catch((err) => { 
                console.error('Login error:', err);
                alert('Connection error or server crash. Please try again.'); 
            });
    }
</script>
{% endblock %}
